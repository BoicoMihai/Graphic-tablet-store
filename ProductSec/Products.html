<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Products.css">
</head>
<body>
    <header class="header">

        <img src="ProdImages/record.png" alt="Blue-circle" id="BlueCircle">
        <button id="Contact">Contact us!</button>

        <div class="search">
            <button id="search-img-button">
            <img src="ProdImages/image.png" alt="" class="search-image">
            </button>
            <input type="text" id="input-box" placeholder="Search">
        </div>

        <button id="button1">
        <img src="ProdImages/ShoppingCart.png" alt="Shopping Cart" class="Cart-image">
        </button>

        <button id="button2">
        <img src="ProdImages/heart.png" alt="Saved Items" class="Saved-items">
        </button>

        <button id="button3">
        <img src="ProdImages/promotion.png" alt="Promotions" class="Promotion">
        </button>

    </header>

    <div id="SideBar">
        <div id="Company-Name">
            <img src="ProdImages/AEON LOGO MARK - 2025.svg" alt="Logo" id="Logo">
            <p id="Logo-text">AEON</p>
        </div>

        <div id="Sidebar-Categories">
            <img src="" alt="">

            <button>
               <img src="ProdImages/filter.png" alt="Filter" idFilter> 
            </button>
        </div>
    </div>

    <script src="Products.js"></script>
</body>
</html>
